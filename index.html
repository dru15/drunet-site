/* ── 2. Fractional Knapsack ── */
codes.knapsackfrac = [
'#include<iostream>',
'using namespace std;',
'',
'int main() {',
'    int n, W;',
'    cin >> n >> W;',
'',
'    float wt[n], val[n], ratio[n];',
'',
'    for (int i = 0; i < n; i++) cin >> wt[i];',
'    for (int i = 0; i < n; i++) cin >> val[i];',
'',
'    for (int i = 0; i < n; i++)',
'        ratio[i] = val[i] / wt[i];',
'',
'    // sort by ratio descending (bubble sort)',
'    for (int i = 0; i < n - 1; i++) {',
'        for (int j = 0; j < n - i - 1; j++) {',
'            if (ratio[j] < ratio[j + 1]) {',
'                swap(ratio[j], ratio[j + 1]);',
'                swap(wt[j],    wt[j + 1]);',
'                swap(val[j],   val[j + 1]);',
'            }',
'        }',
'    }',
'',
'    cout << "\\nAfter sorting:\\n";',
'    for (int i = 0; i < n; i++)',
'        cout << wt[i] << " " << val[i] << " " << ratio[i] << endl;',
'',
'    float profit = 0;',
'    for (int i = 0; i < n; i++) {',
'        if (wt[i] <= W) {',
'            cout << "Take full item " << i << endl;',
'            profit += val[i];',
'            W -= wt[i];',
'        } else {',
'            cout << "Take " << W << " weight of item " << i << endl;',
'            profit += ratio[i] * W;',
'            break;',
'        }',
'    }',
'',
'    cout << "\\nMax Profit = " << profit;',
'    return 0;',
'}'
].join('\n');

/* ── 3. Karatsuba ── */
codes.karatsuba = [
'#include<iostream>',
'#include<cmath>',
'using namespace std;',
'',
'long long k(long long x, long long y) {',
'    if (x < 10 || y < 10) {',
'        cout << "Direct " << x << "*" << y << "=" << x * y << endl;',
'        return x * y;',
'    }',
'    int n = 0; long long t = max(x, y);',
'    while (t) { n++; t /= 10; }',
'    int m = n / 2;',
'    long long p = pow(10, m);',
'    long long a = x / p, b = x % p, c = y / p, d = y % p;',
'    cout << "Split " << x << "->" << a << "," << b << " " << y << "->" << c << "," << d << endl;',
'    long long ac   = k(a, c);',
'    long long bd   = k(b, d);',
'    long long adbc = k(a + b, c + d) - ac - bd;',
'    cout << "ac=" << ac << " bd=" << bd << " ad+bc=" << adbc << endl;',
'    long long res = ac * pow(10, 2 * m) + adbc * p + bd;',
'    cout << "Result " << x << "*" << y << "=" << res << endl;',
'    return res;',
'}',
'',
'int main() {',
'    long long x, y;',
'    cin >> x >> y;',
'    cout << "Final=" << k(x, y);',
'    return 0;',
'}'
].join('\n');

/* ── 5. LCS ── */
codes.lcs = [
'#include <iostream>',
'#include <vector>',
'#include <string>',
'#include <algorithm>',
'',
'using namespace std;',
'',
'void printLCS(string s1, string s2) {',
'    int m = s1.length();',
'    int n = s2.length();',
'    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));',
'',
'    for (int i = 1; i <= m; i++) {',
'        for (int j = 1; j <= n; j++) {',
'            if (s1[i - 1] == s2[j - 1]) {',
'                dp[i][j] = 1 + dp[i - 1][j - 1];',
'            } else {',
'                dp[i][j] = max(dp[i - 1][j], dp[i][j - 1]);',
'            }',
'        }',
'    }',
'',
'    string result = "";',
'    int i = m, j = n;',
'    while (i > 0 && j > 0) {',
'        if (s1[i - 1] == s2[j - 1]) {',
'            result += s1[i - 1];',
'            i--; j--;',
'        } else if (dp[i - 1][j] > dp[i][j - 1]) {',
'            i--;',
'        } else {',
'            j--;',
'        }',
'    }',
'    reverse(result.begin(), result.end());',
'',
'    cout << "Length of LCS : " << dp[m][n] << endl;',
'    cout << "The Sequence  : " << result << endl;',
'}',
'',
'int main() {',
'    string s1 = "ABCBDAB";',
'    string s2 = "BDCAB";',
'    cout << "String 1: " << s1 << endl;',
'    cout << "String 2: " << s2 << endl;',
'    cout << "------------------" << endl;',
'    printLCS(s1, s2);',
'    return 0;',
'}'
].join('\n');

/* ── 6. Maximum Subarray Sum ── */
codes.mss = [
'#include<iostream>',
'#include<climits>',
'using namespace std;',
'',
'int global_max = INT_MIN;',
'int final_start = -1;',
'int final_end   = -1;',
'',
'int f(int a[], int l, int r) {',
'    if (l == r) {',
'        cout << "\\n[" << l << "] -> " << a[l];',
'        if (a[l] > global_max) {',
'            global_max  = a[l];',
'            final_start = l;',
'            final_end   = l;',
'        }',
'        return a[l];',
'    }',
'    int m     = (l + r) / 2;',
'    int left  = f(a, l, m);',
'    int right = f(a, m + 1, r);',
'',
'    int sum = 0, ls = INT_MIN, rs = INT_MIN;',
'    int temp_start = m, temp_end = m + 1;',
'',
'    for (int i = m; i >= l; i--) {',
'        sum += a[i];',
'        if (sum > ls) { ls = sum; temp_start = i; }',
'    }',
'    sum = 0;',
'    for (int i = m + 1; i <= r; i++) {',
'        sum += a[i];',
'        if (sum > rs) { rs = sum; temp_end = i; }',
'    }',
'',
'    int cross = ls + rs;',
'    if (cross > global_max) {',
'        global_max  = cross;',
'        final_start = temp_start;',
'        final_end   = temp_end;',
'    }',
'',
'    cout << "\\n[" << l << "," << r << "] -> L=" << left',
'         << " R=" << right << " C=" << cross;',
'    int ans = max(left, max(right, cross));',
'    cout << " -> ans=" << ans;',
'    return ans;',
'}',
'',
'int main() {',
'    int n; cin >> n;',
'    int a[n];',
'    for (int i = 0; i < n; i++) cin >> a[i];',
'',
'    int final_ans = f(a, 0, n - 1);',
'',
'    cout << "\\n\\n--- Final Output ---";',
'    cout << "\\nMax Sum: "             << final_ans;',
'    cout << "\\nMSS Starts at index: " << final_start;',
'    cout << "\\nMSS Ends at index: "   << final_end;',
'',
'    cout << "\\nFull Array: [";',
'    for (int i = 0; i < n; i++) {',
'        cout << a[i];',
'        if (i < n - 1) cout << ", ";',
'    }',
'    cout << "]\\n";',
'',
'    return 0;',
'}'
].join('\n');

/* ── 10. Ford Fulkerson ── */
codes.fordfulkerson = [
'#include <iostream>',
'#include <vector>',
'#include <queue>',
'#include <climits>',
'',
'using namespace std;',
'',
'const int V = 6;',
'',
'bool bfs(int graph[V][V], int s, int t, int parent[]) {',
'    bool visited[V] = {false};',
'    queue<int> q;',
'    q.push(s);',
'    visited[s] = true;',
'    parent[s] = -1;',
'',
'    while (!q.empty()) {',
'        int u = q.front(); q.pop();',
'        for (int v = 0; v < V; v++) {',
'            if (!visited[v] && graph[u][v] > 0) {',
'                q.push(v);',
'                parent[v] = u;',
'                visited[v] = true;',
'                if (v == t) return true;',
'            }',
'        }',
'    }',
'    return false;',
'}',
'',
'int fordFulkerson(int graph[V][V], int s, int t) {',
'    int parent[V];',
'    int max_flow = 0;',
'',
'    while (bfs(graph, s, t, parent)) {',
'        int path_flow = INT_MAX;',
'        vector<int> path;',
'        path.push_back(t);',
'',
'        for (int v = t; v != s; v = parent[v]) {',
'            int u = parent[v];',
'            path_flow = min(path_flow, graph[u][v]);',
'            path.push_back(u);',
'        }',
'',
'        cout << "Augmenting Path: ";',
'        for (int i = path.size() - 1; i >= 0; i--) {',
'            cout << path[i] << (i == 0 ? "" : " -> ");',
'        }',
'        cout << " | Flow: " << path_flow << endl;',
'',
'        for (int v = t; v != s; v = parent[v]) {',
'            int u = parent[v];',
'            graph[u][v] -= path_flow;',
'            graph[v][u] += path_flow;',
'        }',
'',
'        max_flow += path_flow;',
'    }',
'    return max_flow;',
'}',
'',
'int main() {',
'    int graph[V][V] = {',
'        {0, 16, 13,  0,  0,  0},',
'        {0,  0, 10, 12,  0,  0},',
'        {0,  4,  0,  0, 14,  0},',
'        {0,  0,  9,  0,  0, 20},',
'        {0,  0,  0,  7,  0,  4},',
'        {0,  0,  0,  0,  0,  0}',
'    };',
'    int maxFlow = fordFulkerson(graph, 0, 5);',
'    cout << endl;',
'    cout << "Total Maximum Flow: " << maxFlow << endl;',
'    return 0;',
'}'
].join('\n');

/* ── 11. Floyd Warshall ── */
codes.floydwarshall = [
'#include <iostream>',
'#include <vector>',
'#include <algorithm>',
'',
'using namespace std;',
'',
'const int INF = 1e9;',
'const int V = 4;',
'',
'void floydWarshall(int graph[V][V]) {',
'    int dist[V][V];',
'    for (int i = 0; i < V; i++)',
'        for (int j = 0; j < V; j++)',
'            dist[i][j] = graph[i][j];',
'',
'    for (int k = 0; k < V; k++) {',
'        for (int i = 0; i < V; i++) {',
'            for (int j = 0; j < V; j++) {',
'                if (dist[i][k] != INF && dist[k][j] != INF) {',
'                    dist[i][j] = min(dist[i][j], dist[i][k] + dist[k][j]);',
'                }',
'            }',
'        }',
'    }',
'',
'    cout << "--- Shortest Distances Between Every Pair ---" << endl;',
'    for (int i = 0; i < V; i++) {',
'        for (int j = 0; j < V; j++) {',
'            if (dist[i][j] == INF) cout << "INF\\t";',
'            else cout << dist[i][j] << "\\t";',
'        }',
'        cout << endl;',
'    }',
'}',
'',
'int main() {',
'    int graph[V][V] = {',
'        {0,   5,   INF, 10},',
'        {INF, 0,   3,   INF},',
'        {INF, INF, 0,   1},',
'        {INF, INF, INF, 0}',
'    };',
'    floydWarshall(graph);',
'    return 0;',
'}'
].join('\n');

/* ── 12. Rod Cutting ── */
codes.rodcutting = [
'#include <iostream>',
'#include <vector>',
'',
'using namespace std;',
'',
'void rodCutting(vector<int>& price, int n) {',
'    vector<int> dp(n + 1, 0);',
'    vector<int> cuts(n + 1, 0);',
'',
'    for (int i = 1; i <= n; i++) {',
'        for (int j = 0; j < i; j++) {',
'            int cut_length     = j + 1;',
'            int current_profit = price[j] + dp[i - cut_length];',
'            if (current_profit > dp[i]) {',
'                dp[i]   = current_profit;',
'                cuts[i] = cut_length;',
'            }',
'        }',
'    }',
'',
'    cout << "Maximum Obtainable Value is : $" << dp[n] << endl;',
'    cout << "Exact pieces to cut         : ";',
'    int remaining_length = n;',
'    while (remaining_length > 0) {',
'        cout << cuts[remaining_length] << " ";',
'        remaining_length -= cuts[remaining_length];',
'    }',
'    cout << endl;',
'}',
'',
'int main() {',
'    vector<int> price = {1, 5, 8, 9, 10, 17, 17, 20};',
'    int n = 8;',
'    rodCutting(price, n);',
'    return 0;',
'}'
].join('\n');

/* ── 13. Bellman Ford ── */
codes.bellmanford = [
'#include <iostream>',
'using namespace std;',
'',
'const int INF = 1e9;',
'',
'struct Edge {',
'    int u, v, w;',
'};',
'',
'void bellmanFord(int V, int E, int source, Edge edges[]) {',
'    int dist[100];',
'    for (int i = 0; i < V; i++) dist[i] = INF;',
'    dist[source] = 0;',
'',
'    cout << "--- Exam Trace Table ---" << endl;',
'',
'    for (int i = 1; i <= V - 1; i++) {',
'        for (int j = 0; j < E; j++) {',
'            int u = edges[j].u;',
'            int v = edges[j].v;',
'            int w = edges[j].w;',
'            if (dist[u] != INF && dist[u] + w < dist[v]) {',
'                dist[v] = dist[u] + w;',
'            }',
'        }',
'        cout << "Iteration " << i << ": [ ";',
'        for (int k = 0; k < V; k++) {',
'            if (dist[k] == INF) cout << "INF ";',
'            else cout << dist[k] << " ";',
'        }',
'        cout << "]\\n";',
'    }',
'',
'    // check for negative weight cycle',
'    for (int j = 0; j < E; j++) {',
'        int u = edges[j].u;',
'        int v = edges[j].v;',
'        int w = edges[j].w;',
'        if (dist[u] != INF && dist[u] + w < dist[v]) {',
'            cout << "\\nError: Graph contains a negative weight cycle!" << endl;',
'            return;',
'        }',
'    }',
'',
'    cout << "\\n--- Final Answer ---" << endl;',
'    for (int i = 0; i < V; i++) {',
'        cout << "Distance from " << source << " to " << i << " is " << dist[i] << endl;',
'    }',
'}',
'',
'int main() {',
'    int V = 5;',
'    int E = 8;',
'    Edge edges[8] = {',
'        {0, 1, -1}, {0, 2,  4},',
'        {1, 2,  3}, {1, 3,  2}, {1, 4, 2},',
'        {3, 2,  5}, {3, 1,  1}, {4, 3, -3}',
'    };',
'    bellmanFord(V, E, 0, edges);',
'    return 0;',
'}'
].join('\n');

/* ── order & labels — single source of truth for both buttons and Copy All ── */
var order = [
  'knapsack01', 'knapsackfrac', 'karatsuba', 'mcm', 'lcs', 'mss',
  'graphcolor', 'nqueens', 'subset', 'fordfulkerson', 'floydwarshall',
  'rodcutting', 'bellmanford'
];

var labels = {
  knapsack01:    '0/1 Knapsack',
  knapsackfrac:  'Fractional Knapsack',
  karatsuba:     'Karatsuba Multiplication',
  mcm:           'Matrix Chain Multiplication',
  lcs:           'Longest Common Subsequence',
  mss:           'Maximum Subarray Sum',
  graphcolor:    'Graph Coloring',
  nqueens:       'N-Queens',
  subset:        'Subset Sum',
  fordfulkerson: 'Ford Fulkerson',
  floydwarshall: 'Floyd Warshall',
  rodcutting:    'Rod Cutting',
  bellmanford:   'Bellman Ford'
};

function doCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var status = btn.querySelector('.status');
  btn.classList.add('copied');
  status.textContent = 'copied!';
  setTimeout(function() {
    btn.classList.remove('copied');
    status.textContent = 'click to copy';
  }, 1800);
}

function copyOne(btn, key) {
  doCopy(codes[key], btn);
}

function copyAll(btn) {
  var all = '';
  order.forEach(function(key) {
    all += '========================================\n';
    all += labels[key] + '\n';
    all += '========================================\n';
    all += codes[key] + '\n\n';
  });
  doCopy(all, btn);
}
