<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Algo Codes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; font-family: monospace; padding: 2rem; }
  h1 { color: #444; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 14px 18px; margin-bottom: 10px;
    background: #161616; border: 0.5px solid #2a2a2a;
    border-radius: 8px; cursor: pointer; color: #c9c9c9;
    font-family: monospace; font-size: 13px; letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #1e1e1e; border-color: #3d3d3d; color: #e8e8e8; }
  .btn.copied { border-color: #1d9e75; color: #5DCAA5; }
  .btn.copyall { border-color: #553333; color: #c07070; margin-bottom: 2rem; }
  .btn.copyall:hover { border-color: #aa4444; color: #f99090; background: #1a1010; }
  .btn.copyall.copied { border-color: #1d9e75; color: #5DCAA5; }
  .tag { font-size: 11px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }
  .btn.copied .tag { color: #1d9e75; }
  .btn.copyall .tag { color: #663333; }
  .btn.copyall.copied .tag { color: #1d9e75; }
  .status { font-size: 11px; color: #555; min-width: 70px; text-align: right; }
  .btn.copied .status { color: #1d9e75; }
  .btn.copyall .status { color: #663333; }
  .btn.copyall.copied .status { color: #1d9e75; }
  hr { border: none; border-top: 0.5px solid #1e1e1e; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<h1>Algorithm Codes</h1>

<button class="btn copyall" onclick="copyAll(this)">
  <span>Copy All</span><span class="tag">All 8 topics</span><span class="status">click to copy</span>
</button>

<hr>

<button class="btn" onclick="copyOne(this,'knapsack')">
  <span>0/1 Knapsack</span><span class="tag">DP</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'karatsuba')">
  <span>Karatsuba Multiplication</span><span class="tag">Divide &amp; Conquer</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'mcm')">
  <span>Matrix Chain Multiplication</span><span class="tag">DP</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'lcs')">
  <span>Longest Common Subsequence</span><span class="tag">DP</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'mss')">
  <span>Maximum Subarray Sum</span><span class="tag">Divide &amp; Conquer</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'graphcolor')">
  <span>Graph Coloring</span><span class="tag">Backtracking</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'nqueens')">
  <span>N-Queens</span><span class="tag">Backtracking</span><span class="status">click to copy</span>
</button>
<button class="btn" onclick="copyOne(this,'subset')">
  <span>Subset Sum</span><span class="tag">Backtracking</span><span class="status">click to copy</span>
</button>

<script>
var codes = {};

codes.knapsack = [
'#include <iostream>',
'#include <vector>',
'#include <algorithm>',
'#include <iomanip>',
'',
'using namespace std;',
'',
'void knapsack01(int W, const vector<int>& wt, const vector<int>& val) {',
'    int n = val.size();',
'    vector<vector<int>> dp(n + 1, vector<int>(W + 1, 0));',
'',
'    for (int i = 1; i <= n; i++) {',
'        for (int w = 1; w <= W; w++) {',
'            if (wt[i - 1] <= w) {',
'                dp[i][w] = max(dp[i - 1][w], val[i - 1] + dp[i - 1][w - wt[i - 1]]);',
'            } else {',
'                dp[i][w] = dp[i - 1][w];',
'            }',
'        }',
'    }',
'',
'    cout << "--- 0/1 Knapsack DP Table ---" << endl;',
'    cout << "  i\\w |";',
'    for (int w = 0; w <= W; w++) {',
'        cout << setw(5) << w;',
'    }',
'    cout << endl;',
'',
'    for (int i = 0; i <= n; i++) {',
'        cout << "  i=" << i << " |";',
'        for (int w = 0; w <= W; w++) {',
'            cout << setw(5) << dp[i][w];',
'        }',
'        cout << endl;',
'    }',
'',
'    cout << "\\nFinal Maximum Value: " << dp[n][W] << endl;',
'}',
'',
'int main() {',
'    vector<int> val = {60, 100, 120};',
'    vector<int> wt  = {1, 2, 3};',
'    int W = 5;',
'    knapsack01(W, wt, val);',
'    return 0;',
'}'
].join('\n');

codes.karatsuba = [
'#include <iostream>',
'#include <cmath>',
'#include <algorithm>',
'',
'using namespace std;',
'',
'int getLength(long long value) {',
'    int count = 0;',
'    while (value > 0) {',
'        count++;',
'        value /= 10;',
'    }',
'    return count;',
'}',
'',
'long long karatsuba(long long x, long long y) {',
'    if (x < 10 || y < 10) {',
'        return x * y;',
'    }',
'',
'    int n    = max(getLength(x), getLength(y));',
'    int half = n / 2;',
'    long long m = (long long)pow(10, half);',
'',
'    long long high1 = x / m;',
'    long long low1  = x % m;',
'    long long high2 = y / m;',
'    long long low2  = y % m;',
'',
'    long long z0 = karatsuba(low1, low2);',
'    long long z2 = karatsuba(high1, high2);',
'    long long z1 = karatsuba(low1 + high1, low2 + high2) - z2 - z0;',
'',
'    return (z2 * (long long)pow(10, 2 * half)) + (z1 * m) + z0;',
'}',
'',
'int main() {',
'    long long num1 = 1234;',
'    long long num2 = 5678;',
'    cout << "Multiplying " << num1 << " and " << num2 << endl;',
'    cout << "Standard result  : " << (num1 * num2) << endl;',
'    cout << "Karatsuba result : " << karatsuba(num1, num2) << endl;',
'    return 0;',
'}'
].join('\n');

codes.mcm = [
'#include <iostream>',
'#include <climits>',
'using namespace std;',
'',
'int main() {',
'    int n;',
'    cin >> n;',
'    int p[n + 1];',
'    for (int i = 0; i <= n; i++) {',
'        cin >> p[i];',
'    }',
'',
'    int c[n + 1][n + 1];',
'    for (int i = 1; i <= n; i++) {',
'        c[i][i] = 0;',
'        cout << "c[" << i << "," << i << "] = 0\\n";',
'    }',
'',
'    for (int l = 2; l <= n; l++) {',
'        for (int i = 1; i <= n - l + 1; i++) {',
'            int j = i + l - 1;',
'            c[i][j] = INT_MAX;',
'            for (int k = i; k < j; k++) {',
'                int cost = c[i][k] + c[k + 1][j] + p[i - 1] * p[k] * p[j];',
'                c[i][j] = min(c[i][j], cost);',
'            }',
'            cout << "c[" << i << "," << j << "] = " << c[i][j] << endl;',
'        }',
'    }',
'    return 0;',
'}'
].join('\n');

codes.lcs = [
'#include <iostream>',
'#include <vector>',
'#include <string>',
'#include <algorithm>',
'',
'using namespace std;',
'',
'void printLCS(string s1, string s2) {',
'    int m = s1.length();',
'    int n = s2.length();',
'    vector<vector<int>> dp(m + 1, vector<int>(n + 1, 0));',
'',
'    for (int i = 1; i <= m; i++) {',
'        for (int j = 1; j <= n; j++) {',
'            if (s1[i - 1] == s2[j - 1]) {',
'                dp[i][j] = 1 + dp[i - 1][j - 1];',
'            } else {',
'                dp[i][j] = max(dp[i - 1][j], dp[i][j - 1]);',
'            }',
'        }',
'    }',
'',
'    string result = "";',
'    int i = m, j = n;',
'    while (i > 0 && j > 0) {',
'        if (s1[i - 1] == s2[j - 1]) {',
'            result += s1[i - 1];',
'            i--; j--;',
'        } else if (dp[i - 1][j] > dp[i][j - 1]) {',
'            i--;',
'        } else {',
'            j--;',
'        }',
'    }',
'    reverse(result.begin(), result.end());',
'',
'    cout << "Length of LCS : " << dp[m][n] << endl;',
'    cout << "The Sequence  : " << result << endl;',
'}',
'',
'int main() {',
'    string s1 = "ABCBDAB";',
'    string s2 = "BDCAB";',
'    cout << "String 1: " << s1 << endl;',
'    cout << "String 2: " << s2 << endl;',
'    cout << "------------------" << endl;',
'    printLCS(s1, s2);',
'    return 0;',
'}'
].join('\n');

codes.mss = [
'#include <iostream>',
'#include <vector>',
'#include <climits>',
'',
'using namespace std;',
'',
'struct Result {',
'    int start, end, sum;',
'};',
'',
'Result maxCrossingSum(const vector<int>& arr, int low, int mid, int high) {',
'    int leftSum = INT_MIN, currentSum = 0, maxLeftIndex = mid;',
'    for (int i = mid; i >= low; i--) {',
'        currentSum += arr[i];',
'        if (currentSum > leftSum) {',
'            leftSum = currentSum;',
'            maxLeftIndex = i;',
'        }',
'    }',
'    int rightSum = INT_MIN, maxRightIndex = mid + 1;',
'    currentSum = 0;',
'    for (int i = mid + 1; i <= high; i++) {',
'        currentSum += arr[i];',
'        if (currentSum > rightSum) {',
'            rightSum = currentSum;',
'            maxRightIndex = i;',
'        }',
'    }',
'    return {maxLeftIndex, maxRightIndex, leftSum + rightSum};',
'}',
'',
'Result maxSubArray(const vector<int>& arr, int low, int high) {',
'    if (low == high) return {low, high, arr[low]};',
'    int mid = low + (high - low) / 2;',
'    Result left  = maxSubArray(arr, low, mid);',
'    Result right = maxSubArray(arr, mid + 1, high);',
'    Result cross = maxCrossingSum(arr, low, mid, high);',
'    if (left.sum >= right.sum && left.sum >= cross.sum) return left;',
'    else if (right.sum >= left.sum && right.sum >= cross.sum) return right;',
'    else return cross;',
'}',
'',
'int main() {',
'    vector<int> arr = {-2, 1, -3, 4, -1, 2, 1, -5, 4};',
'    int n = arr.size();',
'    Result result = maxSubArray(arr, 0, n - 1);',
'    cout << "Maximum Subarray Sum : " << result.sum   << endl;',
'    cout << "Starts at index      : " << result.start << endl;',
'    cout << "Ends at index        : " << result.end   << endl;',
'    return 0;',
'}'
].join('\n');

codes.graphcolor = [
'#include <bits/stdc++.h>',
'using namespace std;',
'',
'int n, m;',
'int graph[100][100];',
'int color[100];',
'',
'bool isSafe(int v, int c) {',
'    for (int i = 0; i < n; i++) {',
'        if (graph[v][i] == 1 && color[i] == c)',
'            return false;',
'    }',
'    return true;',
'}',
'',
'void solve(int v) {',
'    if (v == n) {',
'        cout << "{ ";',
'        for (int i = 0; i < n; i++)',
'            cout << color[i] << " ";',
'        cout << "}" << endl;',
'        return;',
'    }',
'    for (int c = 1; c <= m; c++) {',
'        if (isSafe(v, c)) {',
'            color[v] = c;',
'            solve(v + 1);',
'            color[v] = 0;',
'        }',
'    }',
'}',
'',
'int main() {',
'    cin >> n >> m;',
'    for (int i = 0; i < n; i++)',
'        for (int j = 0; j < n; j++)',
'            cin >> graph[i][j];',
'    for (int i = 0; i < n; i++)',
'        color[i] = 0;',
'    solve(0);',
'    return 0;',
'}'
].join('\n');

codes.nqueens = [
'#include <bits/stdc++.h>',
'using namespace std;',
'',
'int b[10], n;',
'',
'bool safe(int r, int c) {',
'    for (int i = 0; i < r; i++)',
'        if (b[i] == c || abs(b[i] - c) == abs(i - r)) return false;',
'    return true;',
'}',
'',
'void solve(int r) {',
'    if (r == n) {',
'        for (int i = 0; i < n; i++)',
'            cout << b[i] + 1 << " ";',
'        cout << "\\n";',
'        return;',
'    }',
'    for (int c = 0; c < n; c++) {',
'        cout << "(" << r + 1 << "," << c + 1 << ")"',
'             << (safe(r, c) ? " placed" : " blocked") << "\\n";',
'        if (safe(r, c)) {',
'            b[r] = c;',
'            solve(r + 1);',
'        }',
'    }',
'}',
'',
'int main() {',
'    cin >> n;',
'    solve(0);',
'    return 0;',
'}'
].join('\n');

codes.subset = [
'#include <iostream>',
'using namespace std;',
'',
'int n, target;',
'int w[100];',
'',
'void printSubset(int x[], int size) {',
'    cout << "{ ";',
'    for (int i = 0; i < size; i++)',
'        cout << x[i] << " ";',
'    cout << "}" << endl;',
'}',
'',
'void subset(int i, int currentSum, int x[], int size) {',
'    if (currentSum == target) {',
'        printSubset(x, size);',
'        return;',
'    }',
'    if (i >= n || currentSum > target)',
'        return;',
'    x[size] = w[i];',
'    subset(i + 1, currentSum + w[i], x, size + 1);',
'    subset(i + 1, currentSum,        x, size);',
'}',
'',
'int main() {',
'    cin >> n;',
'    for (int i = 0; i < n; i++)',
'        cin >> w[i];',
'    cin >> target;',
'    int x[100];',
'    subset(0, 0, x, 0);',
'    return 0;',
'}'
].join('\n');

var labels = {
  knapsack:   '0/1 Knapsack',
  karatsuba:  'Karatsuba Multiplication',
  mcm:        'Matrix Chain Multiplication',
  lcs:        'Longest Common Subsequence',
  mss:        'Maximum Subarray Sum',
  graphcolor: 'Graph Coloring',
  nqueens:    'N-Queens',
  subset:     'Subset Sum'
};

var order = ['knapsack','karatsuba','mcm','lcs','mss','graphcolor','nqueens','subset'];

function doCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var status = btn.querySelector('.status');
  btn.classList.add('copied');
  status.textContent = 'copied!';
  setTimeout(function() {
    btn.classList.remove('copied');
    status.textContent = 'click to copy';
  }, 1800);
}

function copyOne(btn, key) {
  doCopy(codes[key], btn);
}

function copyAll(btn) {
  var all = '';
  order.forEach(function(key) {
    all += '========================================\n';
    all += labels[key] + '\n';
    all += '========================================\n';
    all += codes[key] + '\n\n';
  });
  doCopy(all, btn);
}
</script>
</body>
</html>
