<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For TANU</title>
    <style>
        /* Base Page Styles */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Keeps the floating hearts from creating scrollbars */
        }

        /* The Main Card */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 80%;
            z-index: 10;
            position: relative;
        }

        /* Typography */
        h1 {
            color: #ff4b72;
            margin-bottom: 10px;
            font-size: 2em;
        }

        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Pulsing Heart Animation */
        .heart-icon {
            color: #ff4b72;
            font-size: 60px;
            margin: 10px 0;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Cute Button */
        .cute-btn {
            background-color: #ff4b72;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: bold;
        }

        .cute-btn:hover {
            background-color: #ff2a55;
            transform: translateY(-3px);
        }

        /* Hidden Message Reveal */
        #secret-message {
            display: none;
            margin-top: 20px;
            color: #ff4b72;
            font-weight: bold;
            font-size: 1.2em;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating Hearts Background (Generated by JS) */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: floatUp 5s linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart-icon">❤️</div>
        
        <h1>😈</h1>
        <p>uncomfo ni kra toh bobs bhej hehe (im jk ignore)</p>
        
        <button class="cute-btn" onclick="revealMessage()">Click me for a surprise</button>
        
        <div id="secret-message">
            I LOBJU SO MUCH ✨
        </div>
    </div>

    <script>
        // Reveal the hidden text when the button is clicked
        function revealMessage() {
            document.getElementById("secret-message").style.display = "block";
            // Optionally, hide the button after clicking
            document.querySelector(".cute-btn").style.display = "none";
        }

        // Create floating hearts in the background
        function createHearts() {
            for (let i = 0; i < 20; i++) {
                let heart = document.createElement("div");
                heart.innerHTML = "❤";
                heart.className = "bg-heart";
                
                // Randomize starting position, size, and animation duration
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (Math.random() * 20 + 10) + "px";
                heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
                heart.style.animationDelay = Math.random() * 2 + "s";
                
                document.body.appendChild(heart);
            }
        }
        
        // Start the background effect when the page loads
        window.onload = createHearts;
    </script>
</body>
</html>
