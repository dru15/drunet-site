<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dhruv Agnihotri — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #6c63ff;
      --c2: #a78bfa;
      --c3: #38bdf8;
      --dark: #08080f;
      --darker: #050509;
      --text: #f0f0ff;
      --muted: rgba(240,240,255,0.45);
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    /* === CANVAS BG === */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* === GRAIN OVERLAY === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* === SCENE WRAPPER === */
    .scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      perspective: 1000px;
    }

    /* === FLOATING CARD === */
    .card-3d {
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.12s ease-out;
    }

    .glass {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 4rem 4rem 3.5rem;
      max-width: 640px;
      width: 100%;
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--card-border),
        0 40px 120px rgba(108,99,255,0.15),
        0 0 80px rgba(56,189,248,0.05) inset;
      text-align: center;
    }

    /* top shimmer line */
    .glass::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.6), rgba(56,189,248,0.6), transparent);
      border-radius: 1px;
    }

    /* internal glow blob */
    .glass::after {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 200px;
      background: radial-gradient(ellipse, rgba(108,99,255,0.18) 0%, transparent 70%);
      pointer-events: none;
      border-radius: 50%;
    }

    /* === AVATAR RING === */
    .avatar-wrap {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 1.75rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(from 0deg, #6c63ff, #38bdf8, #a78bfa, #6c63ff) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff 0%, #38bdf8 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #fff;
      user-select: none;
    }

    /* === BADGE === */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.35);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c2);
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6c63ff;
      box-shadow: 0 0 6px #6c63ff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }

    /* === NAME === */
    .name {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      background: linear-gradient(110deg, #f0f0ff 20%, #a78bfa 55%, #38bdf8 85%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    /* === DIVIDER === */
    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, #6c63ff, #38bdf8);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    /* === SKILLS CHIPS === */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: rgba(240,240,255,0.65);
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .chip:hover {
      background: rgba(108,99,255,0.12);
      border-color: rgba(108,99,255,0.3);
      color: var(--c2);
    }

    .chip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* === FLOATING ORBS === */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.18;
    }

    .orb1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6c63ff, transparent 70%);
      top: -120px; left: -80px;
      animation: float1 18s ease-in-out infinite;
    }

    .orb2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #38bdf8, transparent 70%);
      bottom: -80px; right: -60px;
      animation: float2 22s ease-in-out infinite;
    }

    .orb3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: float3 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(40px, 30px); }
      66% { transform: translate(-20px, 60px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-50px, -30px); }
      66% { transform: translate(20px, -60px); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
    }

    /* === ENTRANCE ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .glass > * { animation: fadeUp 0.7s ease both; }
    .avatar-wrap  { animation-delay: 0.05s; }
    .badge        { animation-delay: 0.12s; }
    .name         { animation-delay: 0.18s; }
    .tagline      { animation-delay: 0.22s; }
    .divider      { animation-delay: 0.26s; }
    .chips        { animation-delay: 0.32s; }

    @media (max-width: 520px) {
      .glass { padding: 3rem 2rem 2.5rem; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- Animated bg canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Floating orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="scene" id="scene">
    <div class="card-3d" id="card3d">
      <div class="glass">

        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar-inner">DA</div>
        </div>

        <div class="badge">
          <span class="badge-dot"></span>
          Portfolio — Coming Soon
        </div>

        <h1 class="name">Dhruv Agnihotri</h1>
        <p class="tagline">Crafting something extraordinary.<br>A portfolio worth the wait.</p>

        <div class="divider"></div>

        <!-- Skills chips -->
        <div class="chips">
          <span class="chip"><span class="chip-dot" style="background:#6c63ff"></span>Full-Stack Dev</span>
          <span class="chip"><span class="chip-dot" style="background:#38bdf8"></span>UI / UX Design</span>
          <span class="chip"><span class="chip-dot" style="background:#a78bfa"></span>React & Next.js</span>
          <span class="chip"><span class="chip-dot" style="background:#34d399"></span>Node.js</span>
          <span class="chip"><span class="chip-dot" style="background:#f472b6"></span>Creative Dev</span>
        </div>

      </div>
    </div>
  </div>

  <script>
    /* === PARTICLE CANVAS === */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() { this.reset(true); }
      reset(rand) {
        this.x = Math.random() * W;
        this.y = rand ? Math.random() * H : H + 10;
        this.r = Math.random() * 1.6 + 0.4;
        this.speed = Math.random() * 0.35 + 0.1;
        this.drift = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random() * 0.5 + 0.15;
        const t = Math.random();
        if (t < 0.4) this.color = `rgba(108,99,255,${this.alpha})`;
        else if (t < 0.7) this.color = `rgba(56,189,248,${this.alpha})`;
        else this.color = `rgba(167,139,250,${this.alpha})`;
      }
      update() {
        this.y -= this.speed;
        this.x += this.drift;
        if (this.y < -5) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = Array.from({ length: 120 }, () => new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }

    resize();
    initParticles();
    animateParticles();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    /* === 3D TILT === */
    const scene = document.getElementById('scene');
    const card = document.getElementById('card3d');

    scene.addEventListener('mousemove', e => {
      const rect = scene.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / (rect.width / 2);
      const dy = (e.clientY - cy) / (rect.height / 2);
      card.style.transform = `rotateY(${dx * 10}deg) rotateX(${-dy * 8}deg)`;
    });

    scene.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateY(0deg) rotateX(0deg)';
    });

  </script>
</body>
</html>
